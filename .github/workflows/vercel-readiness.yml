name: Vercel readiness

on:
  push:
    branches:
      - main
      - vercel-ready
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter @workspace/immovia run typecheck 2>&1 | tee frontend-typecheck.log

      - name: Build Vercel frontend output
        if: always()
        run: pnpm --filter @workspace/immovia run build 2>&1 | tee frontend-build.log

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            frontend-typecheck.log
            frontend-build.log
          if-no-files-found: ignore

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @workspace/api-server run typecheck 2>&1 | tee api-typecheck.log

      - name: Typecheck Vercel API entry
        if: always()
        run: >-
          pnpm exec tsc api/index.ts
          --noEmit
          --target ES2022
          --module NodeNext
          --moduleResolution NodeNext
          --esModuleInterop
          --allowSyntheticDefaultImports
          --skipLibCheck
          --strict
          2>&1 | tee vercel-api-typecheck.log

      - name: Upload API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-diagnostics
          path: |
            api-typecheck.log
            vercel-api-typecheck.log
          if-no-files-found: ignore
