name: Remove Stripe setup

on:
  push:
    branches:
      - remove-stripe-setup

permissions:
  contents: write

jobs:
  remove-stripe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: remove-stripe-setup
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Remove Stripe integration
        run: node scripts/remove-stripe-setup.mjs

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Stripe integration and disable online payments"
          git push origin remove-stripe-setup
