openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ImmoVia API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project request operations
  - name: companies
    description: Company registration operations
  - name: chat
    description: AI chatbot operations
  - name: admin
    description: Admin dashboard operations
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all project requests
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Filter by city (case-insensitive partial match)
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by project type
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by project status
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Submit a new project request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project request (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List registered companies
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Filter by city (case-insensitive partial match)
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by service type
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by status (pending | approved | rejected)
        - name: workerType
          in: query
          required: false
          schema:
            type: string
          description: Filter by worker type (individual | company)
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Register a company or professional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Company registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all registered users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}:
    patch:
      operationId: patchAdminUser
      tags: [admin]
      summary: Approve, suspend, reactivate or delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserAction"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "204":
          description: User deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications:
    get:
      operationId: listAdminApplications
      tags: [admin]
      summary: List all service-provider applications
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminApplication"
    post:
      operationId: createAdminApplication
      tags: [admin]
      summary: Create a project application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminApplicationInput"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApplication"

  /admin/applications/{id}:
    patch:
      operationId: patchAdminApplication
      tags: [admin]
      summary: Update application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApplication"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminApplication
      tags: [admin]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [public]
      summary: List active categories with nested subcategories
      responses:
        "200":
          description: Active categories with subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryNested"

  /admin/categories:
    get:
      operationId: listAdminCategories
      tags: [admin]
      summary: List all service categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCategory"
    post:
      operationId: createAdminCategory
      tags: [admin]
      summary: Create a service category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCategory"

  /admin/categories/{id}:
    patch:
      operationId: patchAdminCategory
      tags: [admin]
      summary: Update a service category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminCategory
      tags: [admin]
      summary: Delete a service category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/reports:
    get:
      operationId: listAdminReports
      tags: [admin]
      summary: List all user-submitted reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminReport"

  /admin/reports/{id}:
    patch:
      operationId: patchAdminReport
      tags: [admin]
      summary: Update report status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReport"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get all platform settings
      responses:
        "200":
          description: List of settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
    patch:
      operationId: patchAdminSettings
      tags: [admin]
      summary: Update one or more platform settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyValueMap"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "500":
          description: Error from AI service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, fullName, email, phone, projectType, description, city, status, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        title:
          type: ["string", "null"]
          description: "Human-readable project title"
        projectType:
          type: string
          description: "Category key (renovation | painting | electrical | plumbing | kitchen | flooring | interior_design | cleaning | other)"
        subcategory:
          type: ["string", "null"]
          description: "Sub-category tag key from the selected category's tag list"
        subcategoryOtherText:
          type: ["string", "null"]
          description: "Custom text when subcategory is 'other' (max 40 chars)"
          maxLength: 40
        description:
          type: string
        city:
          type: string
        budget:
          type: ["string", "null"]
        timeline:
          type: ["string", "null"]
        size:
          type: string
          description: "small | medium | large | premium"
        photos:
          type: array
          items:
            type: string
          description: "Array of object paths for project photos"
        status:
          type: string
          description: "pending | reviewing | matched | completed | cancelled"
        createdAt:
          type: string
          format: date-time
        posterName:
          type: string
          description: "Public display name of who posted the project (company name or person's full name)"
        posterAvatarUrl:
          type: ["string", "null"]
          description: "Profile photo / logo of the poster (object path or absolute URL)"
        posterType:
          type: ["string", "null"]
          description: "individual | company"

    ProjectInput:
      type: object
      required: [fullName, email, phone, projectType, description, city]
      properties:
        fullName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        title:
          type: string
          description: "Human-readable project title (optional)"
        projectType:
          type: string
        subcategory:
          type: string
          description: "Sub-category tag key (optional)"
        subcategoryOtherText:
          type: string
          description: "Custom text when subcategory is 'other' (max 40 chars)"
          maxLength: 40
        description:
          type: string
          minLength: 10
        city:
          type: string
        budget:
          type: string
        timeline:
          type: string
        photos:
          type: array
          items:
            type: string
          description: "Array of object paths for project photos"

    ProjectUpdate:
      type: object
      properties:
        status:
          type: string
        title:
          type: string
        description:
          type: string

    Company:
      type: object
      required: [id, companyName, contactName, email, phone, serviceTypes, city, status, workerType, createdAt]
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        serviceTypes:
          type: array
          items:
            type: string
        customServiceTags:
          type: array
          items:
            type: string
          nullable: true
          description: "Custom 'Other' service tags in format 'categoryKey|custom text'"
        city:
          type: string
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        licenseNumber:
          type: ["string", "null"]
        yearsExperience:
          type: ["integer", "null"]
        workerType:
          type: string
          description: "individual | company"
        hourlyRate:
          type: ["integer", "null"]
          description: "Hourly rate in EUR (for individual workers only)"
        profilePhoto:
          type: ["string", "null"]
          description: "Object path of the profile photo"
        status:
          type: string
          description: "pending | approved | rejected"
        createdAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [companyName, contactName, email, phone, serviceTypes, city]
      properties:
        companyName:
          type: string
          minLength: 2
        contactName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        serviceTypes:
          type: array
          items:
            type: string
          minItems: 1
        customServiceTags:
          type: array
          items:
            type: string
          nullable: true
          description: "Custom 'Other' service tags in format 'categoryKey|custom text'"
        city:
          type: string
        description:
          type: string
        website:
          type: string
        licenseNumber:
          type: string
        yearsExperience:
          type: integer
        workerType:
          type: string
          description: "individual | company"
        hourlyRate:
          type: integer
          description: "Hourly rate in EUR (for individual workers only)"
        profilePhoto:
          type: string
          description: "Object path of the profile photo"

    CompanyUpdate:
      type: object
      properties:
        status:
          type: string
        description:
          type: string

    AdminStats:
      type: object
      required: [totalProjects, pendingProjects, totalCompanies, pendingCompanies, projectsByType, projectsByStatus, recentActivity, totalUsers, serviceProviders, projectPosters, approvedCompanies, openProjects]
      properties:
        totalProjects:
          type: integer
        pendingProjects:
          type: integer
        totalCompanies:
          type: integer
        pendingCompanies:
          type: integer
        totalUsers:
          type: integer
        serviceProviders:
          type: integer
        projectPosters:
          type: integer
        approvedCompanies:
          type: integer
        openProjects:
          type: integer
        projectsByType:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
        projectsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    CountByLabel:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, title, status, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          description: "project | company"
        title:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    StatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    KeyValueMap:
      type: object
      additionalProperties:
        type: string

    AdminUser:
      type: object
      required: [id, email, fullName, role, language, verified, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
        providerType:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        language:
          type: string
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AdminUserAction:
      type: object
      required: [action]
      properties:
        action:
          type: string
          description: "approve | suspend | reactivate | delete"

    AdminApplication:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: ["integer", "null"]
        applicantUserId:
          type: ["integer", "null"]
        message:
          type: ["string", "null"]
        proposedPrice:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminApplicationInput:
      type: object
      properties:
        projectId:
          type: integer
        applicantUserId:
          type: integer
        message:
          type: string
        proposedPrice:
          type: string

    CategoryNested:
      type: object
      required: [id, name, slug, type, active, createdAt, subcategories]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          description: "service | project"
        active:
          type: boolean
        parentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        subcategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryNestedItem"

    CategoryNestedItem:
      type: object
      required: [id, name, slug, type, active, parentId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        type:
          type: string
        active:
          type: boolean
        parentId:
          type: integer
        createdAt:
          type: string
          format: date-time

    AdminCategory:
      type: object
      required: [id, name, slug, type, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          description: "service | project"
        active:
          type: boolean
        parentId:
          type: ["integer", "null"]
          description: "ID of the parent category, or null for a top-level category"
        createdAt:
          type: string
          format: date-time

    AdminCategoryInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        type:
          type: string
        active:
          type: boolean
        parentId:
          type: ["integer", "null"]
          description: "ID of the parent category, or null for a top-level category"

    AdminReport:
      type: object
      required: [id, targetType, targetId, reason, status, createdAt]
      properties:
        id:
          type: integer
        reporterId:
          type: ["integer", "null"]
        targetType:
          type: string
        targetId:
          type: integer
        reason:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminSetting:
      type: object
      required: [id, key, value, updatedAt]
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
        updatedAt:
          type: string
          format: date-time

    ChatMessageInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        language:
          type: string
          description: "sq | en | de"

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
