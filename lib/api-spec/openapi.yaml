openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ImmoVia API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project request operations
  - name: companies
    description: Company registration operations
  - name: chat
    description: AI chatbot operations
  - name: admin
    description: Admin dashboard operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all project requests
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Submit a new project request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project request (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List registered companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Register a company or professional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Company registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "500":
          description: Error from AI service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, fullName, email, phone, projectType, description, city, status, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        projectType:
          type: string
          description: "renovation | construction | interior | exterior | other"
        description:
          type: string
        city:
          type: string
        budget:
          type: ["string", "null"]
        timeline:
          type: ["string", "null"]
        status:
          type: string
          description: "pending | reviewing | matched | completed | cancelled"
        createdAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [fullName, email, phone, projectType, description, city]
      properties:
        fullName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        projectType:
          type: string
        description:
          type: string
          minLength: 10
        city:
          type: string
        budget:
          type: string
        timeline:
          type: string

    ProjectUpdate:
      type: object
      properties:
        status:
          type: string
        description:
          type: string

    Company:
      type: object
      required: [id, companyName, contactName, email, phone, serviceTypes, city, status, createdAt]
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        serviceTypes:
          type: array
          items:
            type: string
        city:
          type: string
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        licenseNumber:
          type: ["string", "null"]
        yearsExperience:
          type: ["integer", "null"]
        status:
          type: string
          description: "pending | approved | rejected"
        createdAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [companyName, contactName, email, phone, serviceTypes, city]
      properties:
        companyName:
          type: string
          minLength: 2
        contactName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        serviceTypes:
          type: array
          items:
            type: string
          minItems: 1
        city:
          type: string
        description:
          type: string
        website:
          type: string
        licenseNumber:
          type: string
        yearsExperience:
          type: integer

    CompanyUpdate:
      type: object
      properties:
        status:
          type: string
        description:
          type: string

    AdminStats:
      type: object
      required: [totalProjects, pendingProjects, totalCompanies, pendingCompanies, projectsByType, projectsByStatus, recentActivity]
      properties:
        totalProjects:
          type: integer
        pendingProjects:
          type: integer
        totalCompanies:
          type: integer
        pendingCompanies:
          type: integer
        projectsByType:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
        projectsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    CountByLabel:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, title, status, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          description: "project | company"
        title:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatMessageInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        language:
          type: string
          description: "sq | en | de"

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
