    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Chatbase chat widget -->
    <script>
      (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="sCAJBcXM9vHhwBn_Wxh19";script.domain="immovia365.ch";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>
    <!-- Chatbase mobile: constrain to bottom-sheet (partial screen) -->
    <script>
      (function () {
        var mq = window.matchMedia('(max-width: 768px)');
        if (!mq.matches) return;

        function constrainWindow(el) {
          el.style.setProperty('position', 'fixed', 'important');
          el.style.setProperty('height', '55vh', 'important');
          el.style.setProperty('max-height', '55vh', 'important');
          el.style.setProperty('width', 'calc(100vw - 24px)', 'important');
          el.style.setProperty('max-width', 'calc(100vw - 24px)', 'important');
          el.style.setProperty('top', 'auto', 'important');
          el.style.setProperty('bottom', '88px', 'important');
          el.style.setProperty('left', '12px', 'important');
          el.style.setProperty('right', '12px', 'important');
          el.style.setProperty('border-radius', '20px', 'important');
          el.style.setProperty('box-shadow', '0 12px 48px rgba(0,0,0,0.22)', 'important');
          el.style.setProperty('pointer-events', 'auto', 'important');
          el.style.setProperty('z-index', '2147483647', 'important');
        }

        function neutralizeAncestors(iframe) {
          // Walk up from the iframe and make every fixed/absolute-positioned
          // ancestor transparent and click-through, so it doesn't cover the page.
          var p = iframe.parentElement;
          var hops = 0;
          while (p && p !== document.body && hops < 8) {
            var cs = window.getComputedStyle(p);
            if (cs.position === 'fixed' || cs.position === 'absolute') {
              p.style.setProperty('background', 'transparent', 'important');
              p.style.setProperty('background-color', 'transparent', 'important');
              p.style.setProperty('backdrop-filter', 'none', 'important');
              p.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
              p.style.setProperty('pointer-events', 'none', 'important');
              // Keep wrapper full-viewport sized so it can hold the iframe in place,
              // but it's invisible & non-blocking now.
            }
            p = p.parentElement;
            hops++;
          }
        }

        function unlockBodyScroll() {
          // Chatbase may set body { overflow: hidden } on mobile to lock page scroll.
          var bs = document.body && document.body.style;
          if (bs) {
            if (bs.overflow === 'hidden') bs.setProperty('overflow', 'auto', 'important');
            if (bs.position === 'fixed') bs.setProperty('position', 'static', 'important');
            if (bs.height) bs.setProperty('height', 'auto', 'important');
          }
          var hs = document.documentElement && document.documentElement.style;
          if (hs && hs.overflow === 'hidden') {
            hs.setProperty('overflow', 'auto', 'important');
          }
        }

        function scan() {
          document.querySelectorAll('iframe').forEach(function (f) {
            var src = f.src || '';
            var id = f.id || '';
            if (!src.includes('chatbase') && !id.includes('chatbase')) return;
            // Skip the small bubble button iframe (height < 80px)
            var h = parseInt(f.style.height || '0');
            if (h > 0 && h < 80) return;
            // Apply whenever the frame looks like the open chat window
            if (f.style.position === 'fixed' || h > 80 || f.style.height === '100%') {
              constrainWindow(f);
              neutralizeAncestors(f);
            }
          });
          unlockBodyScroll();
        }

        var observer = new MutationObserver(function () {
          requestAnimationFrame(scan);
        });

        window.addEventListener('load', function () {
          observer.observe(document.body, {
            subtree: true,
            childList: true,
            attributes: true,
            attributeFilter: ['style']
          });
          scan();
        });
      })();
    </script>
  </body>
</html>
