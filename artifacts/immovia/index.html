<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ImmoVia</title>
    <meta name="description" content="ImmoVia — Professional renovation and construction services connecting homeowners with vetted contractors across Albania, Germany, and Switzerland." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0D1535" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- OpenGraph -->
    <meta property="og:title" content="ImmoVia — Renovation &amp; Construction Services" />
    <meta property="og:description" content="Connect with vetted contractors for your renovation or construction project across Albania, Germany, and Switzerland." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_APP_URL%/" />
    <meta property="og:image" content="%VITE_APP_URL%/og-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ImmoVia — Professional renovation and construction services" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ImmoVia — Renovation &amp; Construction Services" />
    <meta name="twitter:description" content="Connect with vetted contractors for your renovation or construction project across Albania, Germany, and Switzerland." />
    <meta name="twitter:image" content="%VITE_APP_URL%/og-share.png" />
    <meta name="twitter:image:alt" content="ImmoVia — Professional renovation and construction services" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Chatbase chat widget -->
    <script>
      (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="sCAJBcXM9vHhwBn_Wxh19";script.domain="immovia365.ch";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>
    <!-- Chatbase mobile: constrain to bottom-sheet (partial screen) -->
    <script>
      (function () {
        var mq = window.matchMedia('(max-width: 768px)');
        if (!mq.matches) return;

        function constrainWindow(el) {
          el.style.setProperty('height', '70vh', 'important');
          el.style.setProperty('max-height', '70vh', 'important');
          el.style.setProperty('top', 'auto', 'important');
          el.style.setProperty('bottom', '76px', 'important');
          el.style.setProperty('border-radius', '20px 20px 0 0', 'important');
          el.style.setProperty('box-shadow', '0 -8px 40px rgba(0,0,0,0.18)', 'important');
          el.style.setProperty('width', '100%', 'important');
          el.style.setProperty('right', '0', 'important');
          el.style.setProperty('left', '0', 'important');
        }

        function scan() {
          document.querySelectorAll('iframe').forEach(function (f) {
            var src = f.src || '';
            var id = f.id || '';
            if (!src.includes('chatbase') && !id.includes('chatbase')) return;
            // Skip the small bubble button iframe (height < 80px)
            var h = parseInt(f.style.height || '0');
            if (h > 0 && h < 80) return;
            // Apply whenever the frame looks like the open chat window
            if (f.style.position === 'fixed' || h > 80 || f.style.height === '100%') {
              constrainWindow(f);
            }
          });
        }

        var observer = new MutationObserver(function () {
          requestAnimationFrame(scan);
        });

        window.addEventListener('load', function () {
          observer.observe(document.body, {
            subtree: true,
            childList: true,
            attributes: true,
            attributeFilter: ['style']
          });
          scan();
        });
      })();
    </script>
  </body>
</html>
